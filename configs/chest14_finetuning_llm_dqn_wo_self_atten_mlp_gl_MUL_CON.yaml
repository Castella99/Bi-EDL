experiment_name: 'CARZero_Globa_local_MLP'  # Train CARZero with global and local feature concate, mlp layer for SimR project
project: 'CARZero_Finetuning_MulCon'
name: 'CARZero_MUL_CON_ver7.1'
phase: 'pretrain_llm_dqn_wo_self_atten_mlp_gl'
trial_name:

freeze:
    image: true
    text: false
    fusion: false

peft:
    enabled: false
    r: 8
    alpha: 16
    dropout: 0.1
    adaptor_name: 'lora'

lightning:
    trainer:
        gpus: 2
        max_epochs: 50
        distributed_backend: 'ddp'
        gradient_clip_val: 0.25
        lr: 0.00005
        precision: '16-mixed'
        reload_dataloaders_every_epoch: True  # reload dataloader to change batch size
        val_check_interval: 1.0
    checkpoint_callback: 
        monitor: 'val/loss'
        dirpath: './data/ckpt'
        save_last: true 
        mode: min
        save_top_k: 1
    early_stopping_callback:
        monitor: 'val/loss'
        min_delta: 0.00
        patience: 50
        verbose: True
        mode: 'min'
    logger:
        logger_type: 'CSVLogger'  #WandbLogger
        save_dir: './data/CSV'

model:
    norm: false
    CARZero: 
        local_loss_weight: 1.0
        global_loss_weight: 1.0
        ce_loss_weight: 1.0
        temp1: 4.0
        temp2: 5.0
        temp3: 10.0
    vision:   
        model_name: 'vit_b_16'
        base: 'transformer'  
        # model_name: 'resnet_50' 
        # base: 'conv'  
        freeze_cnn: false
        pretrained: true


    text:  
        bert_type: "Laihaoran/BioClinicalMPBERT"
        last_n_layers: 4
        aggregate_method: 'sum'
        norm: false
        embedding_dim: 768
        freeze_bert: false
        agg_tokens: true
    fusion:
        d_model: 768
        H: 4
        N: 4
        dropout: 0.1
        state_prob: 1
        class_num: 1
        decoder_number_layer: 4
# 
data: 
    dataset: pretrain_xh
    text: 
      word_num: 97
      captions_per_image: 5
      full_report: false
    image:
        imsize: 256

transforms: 
    norm: 'CXR_MAE'
    random_crop:
        crop_size: 224
    random_horizontal_flip: 0.3
    random_affine:
        degrees: 30
        translate: [0.1, 0.1]
        scale: [0.9, 1.1]
    color_jitter:
        bightness: [0.8, 1.2]
        contrast: [0.8, 1.2]

train: 
    update_interval: 1000
    batch_size: 256
    num_workers: 12
    nvis: 4
    rand_vis: false 
    optimizer: 
        name: 'Adam'
        weight_decay: 1e-6
    scheduler: 
        name: 'plateau'
        monitor: 'val/loss'
        interval: 'epoch'
        frequency: 1
    seed: 14
    prob_sched: true
    max_epoch: 50

test : 
    batch_size: 512
    num_workers: 12